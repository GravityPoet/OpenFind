name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    name: Sign, notarize, appcast, and publish
    runs-on: macos-26
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Resolve version and build number
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          IFS=. read -r MAJOR MINOR PATCH <<<"$VERSION"
          BUILD_NUMBER=$((MAJOR * 1000000 + MINOR * 1000 + PATCH))
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"
          echo "DOWNLOAD_PREFIX=https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/" >> "$GITHUB_ENV"
          echo "SPARKLE_FEED_URL=https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/appcast.xml" >> "$GITHUB_ENV"

      - name: Run tests at the macOS 14 deployment target
        run: MACOSX_DEPLOYMENT_TARGET=14.0 xcrun --sdk macosx swift test

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_CERT_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.RELEASE_KEYCHAIN_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/openfind-signing.keychain-db"
          printf '%s' "$CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          SIGN_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | sed -n 's/.*"\(Developer ID Application:[^"]*\)".*/\1/p' | head -n 1)"
          test -n "$SIGN_IDENTITY"
          echo "SIGN_IDENTITY=$SIGN_IDENTITY" >> "$GITHUB_ENV"
          echo "SIGNING_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Configure App Store Connect notarization key
        env:
          NOTARY_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        shell: bash
        run: |
          set -euo pipefail
          NOTARY_KEY_PATH="$RUNNER_TEMP/AuthKey_${NOTARY_KEY_ID}.p8"
          printf '%s' "$NOTARY_KEY_BASE64" | base64 --decode > "$NOTARY_KEY_PATH"
          xcrun notarytool store-credentials OpenFindRelease \
            --key "$NOTARY_KEY_PATH" \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER_ID" \
            --keychain "$SIGNING_KEYCHAIN_PATH"

      - name: Build, sign, notarize, staple, and verify Universal app
        env:
          SPARKLE_PUBLIC_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
        run: |
          DISTRIBUTION=developer-id \
          SIGN_TIMESTAMP=1 \
          NOTARIZE=1 \
          NOTARY_PROFILE=OpenFindRelease \
          NOTARY_KEYCHAIN="$SIGNING_KEYCHAIN_PATH" \
          APP_VERSION="$APP_VERSION" \
          BUILD_NUMBER="$BUILD_NUMBER" \
          SPARKLE_FEED_URL="$SPARKLE_FEED_URL" \
          SPARKLE_PUBLIC_KEY="$SPARKLE_PUBLIC_KEY" \
          bash Scripts/build_app.sh

      - name: Verify lossless content-index budgets
        run: FILES=8000 BODY_KB=16 COPIES=4 bash Scripts/benchmark_content_index.sh

      - name: Verify cold name-index build and search budgets
        run: FILES=600 MATCH_EVERY=60 bash Scripts/benchmark_index.sh

      - name: Verify persisted name-index budgets
        run: NODES=250000 bash Scripts/benchmark_name_index.sh

      - name: Generate EdDSA-signed phased appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          APPCAST_DIR="$RUNNER_TEMP/openfind-appcast"
          mkdir -p "$APPCAST_DIR"
          cp dist/OpenFind.zip "$APPCAST_DIR/OpenFind.zip"
          cat > "$APPCAST_DIR/OpenFind.md" <<NOTES
          OpenFind ${APP_VERSION}

          See the GitHub release for verified changes and compatibility details.
          NOTES
          printf '%s' "$SPARKLE_PRIVATE_KEY" | \
            .build/artifacts/sparkle/Sparkle/bin/generate_appcast \
              --ed-key-file - \
              --download-url-prefix "$DOWNLOAD_PREFIX" \
              --phased-rollout-interval 86400 \
              --maximum-versions 3 \
              --maximum-deltas 5 \
              --delta-compression lzfse \
              --embed-release-notes \
              "$APPCAST_DIR"
          test -s "$APPCAST_DIR/appcast.xml"
          xmllint --noout "$APPCAST_DIR/appcast.xml"
          cp "$APPCAST_DIR/appcast.xml" dist/appcast.xml
          shasum -a 256 dist/appcast.xml > dist/appcast.xml.sha256

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            dist/OpenFind.zip \
            dist/OpenFind.zip.sha256 \
            dist/appcast.xml \
            dist/appcast.xml.sha256 \
            --verify-tag \
            --title "OpenFind ${APP_VERSION}" \
            --generate-notes
