name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      target_tag:
        description: Existing release tag to recover without moving it
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Sign, appcast, and publish
    runs-on: macos-26
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.target_tag || github.ref_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.target_tag || github.ref }}

      - name: Resolve version and build number
        shell: bash
        run: |
          set -euo pipefail
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          TAG_SHA="$(git rev-parse "${RELEASE_TAG}^{commit}")"
          CHECKOUT_SHA="$(git rev-parse HEAD)"
          test "$TAG_SHA" = "$CHECKOUT_SHA"
          VERSION="${RELEASE_TAG#v}"
          IFS=. read -r MAJOR MINOR PATCH <<<"$VERSION"
          BUILD_NUMBER=$((MAJOR * 1000000 + MINOR * 1000 + PATCH))
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"
          echo "RELEASE_SHA=$CHECKOUT_SHA" >> "$GITHUB_ENV"
          echo "DOWNLOAD_PREFIX=https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/" >> "$GITHUB_ENV"

      - name: Run tests at the macOS 14 deployment target
        run: MACOSX_DEPLOYMENT_TARGET=14.0 xcrun --sdk macosx swift test --no-parallel

      - name: Run Drive Alive production scheduling integration
        env:
          OPENFIND_RUN_DRIVE_ALIVE_INTEGRATION: "1"
        run: MACOSX_DEPLOYMENT_TARGET=14.0 xcrun --sdk macosx swift test --no-parallel --filter DriveAliveIntegrationTests

      - name: Run visual regression at the macOS 14 deployment target
        env:
          OPENFIND_RUN_VISUAL_REGRESSION: "1"
        run: MACOSX_DEPLOYMENT_TARGET=14.0 xcrun --sdk macosx swift test --filter VisualRegressionTests

      - name: Import pinned OpenFind customer certificate
        timeout-minutes: 3
        env:
          CERTIFICATE_BASE64: ${{ secrets.OPENFIND_CUSTOMER_CERT_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.OPENFIND_CUSTOMER_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.RELEASE_KEYCHAIN_PASSWORD }}
          EXPECTED_SIGNING_CERT_SHA1: 3E146B469F41DEB31E45C28D0E9C512B3E5A41C1
        shell: bash
        run: |
          set -euo pipefail
          CERTIFICATE_PATH="$RUNNER_TEMP/openfind-customer.p12"
          CERTIFICATE_PEM="$RUNNER_TEMP/openfind-customer.pem"
          KEYCHAIN_PATH="$RUNNER_TEMP/openfind-signing.keychain-db"
          test -n "$CERTIFICATE_BASE64"
          test -n "$CERTIFICATE_PASSWORD"
          test -n "$KEYCHAIN_PASSWORD"
          printf '%s' "$CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          echo "Creating isolated release keychain"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "Importing PKCS#12 signing identity"
          security import "$CERTIFICATE_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -T /usr/bin/codesign \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          echo "Validating pinned certificate fingerprint"
          openssl pkcs12 \
            -in "$CERTIFICATE_PATH" \
            -legacy \
            -clcerts \
            -nokeys \
            -passin "pass:$CERTIFICATE_PASSWORD" \
            -out "$CERTIFICATE_PEM"
          ACTUAL_SIGNING_CERT_SHA1="$(openssl x509 \
            -in "$CERTIFICATE_PEM" \
            -noout \
            -fingerprint \
            -sha1 \
            | awk -F= '{ print toupper($2) }' \
            | tr -d ':')"
          test "$ACTUAL_SIGNING_CERT_SHA1" = "$EXPECTED_SIGNING_CERT_SHA1"
          echo "Authorizing non-interactive codesign access"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          echo "SIGN_IDENTITY=$EXPECTED_SIGNING_CERT_SHA1" >> "$GITHUB_ENV"
          echo "EXPECTED_SIGNING_CERT_SHA1=$EXPECTED_SIGNING_CERT_SHA1" >> "$GITHUB_ENV"

      - name: Build and verify pinned self-signed Universal app
        run: |
          APP_VERSION="$APP_VERSION" \
          BUILD_NUMBER="$BUILD_NUMBER" \
          bash Scripts/build_customer_app.sh

      - name: Verify lossless content-index budgets
        run: FILES=8000 BODY_KB=16 COPIES=4 bash Scripts/benchmark_content_index.sh

      - name: Verify cold name-index build and search budgets
        run: FILES=600 MATCH_EVERY=60 bash Scripts/benchmark_index.sh

      - name: Verify persisted name-index budgets
        run: NODES=250000 bash Scripts/benchmark_name_index.sh

      - name: Generate EdDSA-signed phased appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          APPCAST_DIR="$RUNNER_TEMP/openfind-appcast"
          mkdir -p "$APPCAST_DIR"
          cp dist/OpenFind.zip "$APPCAST_DIR/OpenFind.zip"
          cat > "$APPCAST_DIR/OpenFind.md" <<NOTES
          OpenFind ${APP_VERSION}

          See the GitHub release for verified changes and compatibility details.
          NOTES
          printf '%s' "$SPARKLE_PRIVATE_KEY" | \
            .build/artifacts/sparkle/Sparkle/bin/generate_appcast \
              --ed-key-file - \
              --download-url-prefix "$DOWNLOAD_PREFIX" \
              --phased-rollout-interval 86400 \
              --maximum-versions 3 \
              --maximum-deltas 5 \
              --delta-compression lzfse \
              --embed-release-notes \
              "$APPCAST_DIR"
          test -s "$APPCAST_DIR/appcast.xml"
          xmllint --noout "$APPCAST_DIR/appcast.xml"
          cp "$APPCAST_DIR/appcast.xml" dist/appcast.xml
          APPCAST_SHA256="$(shasum -a 256 dist/appcast.xml | awk '{print $1}')"
          printf '%s  appcast.xml\n' "$APPCAST_SHA256" > dist/appcast.xml.sha256

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "$RELEASE_TAG" \
            dist/OpenFind.zip \
            dist/OpenFind.zip.sha256 \
            dist/appcast.xml \
            dist/appcast.xml.sha256 \
            --verify-tag \
            --title "OpenFind ${APP_VERSION}" \
            --generate-notes
